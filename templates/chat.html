<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyurScan | AI Consultation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .leaf-gradient { background: linear-gradient(135deg, #1e3a1a 0%, #2d5a27 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .chat-messages { height: calc(100vh - 250px); }
    </style>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col">

    <header class="leaf-gradient text-white py-4 shadow-md">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
                <i class="fas fa-arrow-left"></i>
                <h1 class="font-bold text-xl uppercase tracking-widest">AyurScan AI</h1>
            </a>
            <span class="text-xs bg-green-900/50 px-3 py-1 rounded-full text-green-200">AI Consultation Mode</span>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl flex-1 flex flex-col">
        <div class="glass-card flex-1 rounded-3xl shadow-xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-stone-100 flex items-center justify-between bg-stone-50/50">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full leaf-gradient flex items-center justify-center text-white shadow-inner">
                        <i class="fas fa-magic"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-stone-800">Ayurvedic Consultant</h3>
                        <p class="text-xs text-green-600">Online & Ready to Help</p>
                    </div>
                </div>
            </div>

            <div id="chatMessages" class="chat-messages p-6 overflow-y-auto space-y-4">
                <div class="flex justify-start">
                    <div class="max-w-[80%] p-4 rounded-2xl bg-stone-100 text-stone-800 rounded-bl-none shadow-sm">
                        Namaste! I am your AI Ayurvedic consultant. Describe your symptoms or ask about specific medicinal herbs, and I will recommend traditional treatments.
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white border-t border-stone-100">
                <div class="flex gap-4">
                    <input type="text" id="chatInput" class="flex-1 border-2 border-stone-100 rounded-2xl px-6 py-4 focus:border-green-800 outline-none transition" placeholder="e.g. 'I have a sore throat' or 'Benefits of Tulsi'...">
                    <button id="chatSend" class="bg-green-800 text-white w-14 h-14 rounded-2xl hover:bg-green-900 transition flex items-center justify-center shadow-lg">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');
        const chatMessages = document.getElementById('chatMessages');

        const sendMessage = async () => {
            const message = chatInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            chatInput.value = '';

            const loadingId = 'loading-' + Date.now();
            addMessage('<div class="flex gap-2 p-2"><div class="w-2 h-2 bg-stone-400 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-stone-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div><div class="w-2 h-2 bg-stone-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div></div>', 'bot', loadingId);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                // Remove loading indicator and create a new bot message bubble
                document.getElementById(loadingId).remove();
                const botMessageId = 'bot-' + Date.now();
                addMessage('', 'bot', botMessageId);
                const botMessageDiv = document.querySelector(`#${botMessageId} div`);

                let done = false;
                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;
                    const chunk = decoder.decode(value, { stream: true });
                    botMessageDiv.innerHTML += chunk;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            } catch (err) {
                console.error('Error:', err);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                addMessage("I apologize, but I am unable to connect to the knowledge base right now.", 'bot');
            }
        };

        function addMessage(text, sender, id = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            if (id) wrapper.id = id;

            const div = document.createElement('div');
            div.className = `max-w-[80%] p-4 rounded-2xl shadow-sm ${
                sender === 'user' 
                ? 'bg-green-800 text-white rounded-br-none' 
                : 'bg-stone-100 text-stone-800 rounded-bl-none'
            }`;
            div.innerHTML = text;

            wrapper.appendChild(div);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatSend.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
